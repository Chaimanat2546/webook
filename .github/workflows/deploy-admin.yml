name: Deploy Admin Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-admin:
    runs-on: ubuntu-latest
    environment: Cloudflare-Staging

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      ADVERTISEMENT_IMAGE_WORKER_URL: ${{ secrets.ADVERTISEMENT_IMAGE_WORKER_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify deployment secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || { echo "Missing GitHub secret: NEXT_PUBLIC_SUPABASE_URL"; exit 1; }
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || { echo "Missing GitHub secret: NEXT_PUBLIC_SUPABASE_ANON_KEY"; exit 1; }
          test -n "$ADVERTISEMENT_IMAGE_WORKER_URL" || { echo "Missing GitHub secret: ADVERTISEMENT_IMAGE_WORKER_URL"; exit 1; }

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run deploy
